<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jia LIU</title>

  <style>
/* 全局字体改为 Helvetica */
body {
  font-family: 'Helvetica', sans-serif; /* 全站文字用 Helvetica */
  margin: 0;
  padding: 0;
  background: #fff;
  color: #222;
  font-weight: 300;  /* 默认细字 */
}

    /* Header: large title + brief intro */
    header {
      text-align: center;
      padding: 60px 20px 40px;
      background: #fff;
    }

header h1 {
  font-size: 4em;
  margin: 0;
  color: #222;
  font-weight: 500;   /* 粗体 */
}

header p {
  font-size: 1.2em;
  margin-top: 10px;
  color: #555;
  font-weight: 300;   /* 细字 */
}

    /* Navigation menu */
    nav {
      text-align: center;
      margin: 30px 0;
    }

nav a {
  display: inline-block;
  margin: 0 15px;
  text-decoration: none;
  color: #222;
  font-weight: 300;    /* 细字 */
  font-size: 1em;
  transition: color 0.3s, font-weight 0.3s;
}

nav a:hover {
  color: #0073e6;
  font-weight: 700;   /* 悬停加粗，增强反馈 */
}

    /* Carousel container */
    .carousel {
      position: relative;
      max-width: 800px;
      margin: 0 auto 60px;
      overflow: hidden;
      border-radius: 10px;
    }

    .carousel img {
      width: 100%;
      display: none;
    }

    .carousel img.active {
      display: block;
    }

    /* Left/right arrows */
   .carousel button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.06);
  border: none;
  color: #fff;
  font-size: 2em;
  padding: 10px;
  cursor: pointer;
  border-radius: 50%;
  opacity: 0;             /* 初始透明 */
  transition: opacity 0.3s;
}


    .carousel button.prev {
      left: 10px;
    }

    .carousel button.next {
      right: 10px;
    }
    /* 鼠标悬停轮播图显示按钮 */
.carousel:hover button {
  opacity: 1;
}
  </style>
</head>

<body>

<header>
  <h1>Jia LIU</h1>
  <p>Illustration · Animation · Graphic Design · Translation</p>
</header>

<nav>
  <a href="#">About</a>
  <a href="#">Work</a>
  <a href="#">Links</a>
</nav>

<div class="carousel">
  <img src="nikkas-tiny-wonders01.jpg" class="active">
  <img src="nikkas-tiny-wonders02.jpg">
  <img src="image3.jpg">
  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>
</div>

<script>
  // Carousel script
  const images = document.querySelectorAll('.carousel img');
  const prevBtn = document.querySelector('.carousel .prev');
  const nextBtn = document.querySelector('.carousel .next');
  let current = 0;

  function showImage(index) {
    images.forEach((img, i) => img.classList.toggle('active', i === index));
  }

  prevBtn.addEventListener('click', () => {
    current = (current - 1 + images.length) % images.length;
    showImage(current);
  });

  nextBtn.addEventListener('click', () => {
    current = (current + 1) % images.length;
    showImage(current);
  });

  // Optional: automatic slideshow every 5 seconds
  setInterval(() => {
    current = (current + 1) % images.length;
    showImage(current);
  }, 5000);
</script>

</body>
</html>
