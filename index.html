<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jia LIU</title>

  <style>
/* 全局字体改为 Helvetica */
body {
  font-family: 'Helvetica', sans-serif; /* 全站文字用 Helvetica */
  margin: 0;
  padding: 0;
  background: #fff;
  color: #222;
  font-weight: 300;  /* 默认细字 */
  overflow: hidden;  /* 避免滚动条出现 */
}

/* Header: large title + brief intro */
header {
  text-align: center;
  padding: 10vh 20px 2vh;  /* 使用 vh 适应屏幕高度 */
  background: #fff;
}

header h1 {
  font-size: 4em;
  margin: 0;
  color: #222;
  font-weight: 700;   /* 大标题粗体 */
}

header p {
  font-size: 1.2em;
  margin-top: 10px;
  color: #555;
  font-weight: 300;   /* 细字 */
}

/* Navigation menu */
nav {
  text-align: center;
  margin: 2vh 0;       /* 使用 vh 适应屏幕 */
}

nav a {
  display: inline-block;
  margin: 0 15px;
  text-decoration: none;
  color: #222;
  font-weight: 300;    /* 细字 */
  font-size: 1em;
  transition: color 0.3s, font-weight 0.3s;
}

nav a:hover {
  color: #0073e6;
  font-weight: 700;   /* 悬停加粗 */
}

/* Carousel container */
.carousel {
  position: relative;
  max-width: 800px;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 10px;

  height: 60vh;          /* 占屏幕60%高度，自适应 */
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: contain;    /* 保持比例，完整显示 */
  display: none;
}

.carousel img.active {
  display: block;
}

/* Left/right arrows */
.carousel button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.06);
  border: none;
  color: #fff;
  font-size: 2em;
  cursor: pointer;

  width: 50px;           /* 固定宽高正圆 */
  height: 50px;
  line-height: 50px;     
  border-radius: 50%;    
  text-align: center;    

  opacity: 0;            /* 悬停显示 */
  transition: opacity 0.3s;
  padding: 0;            
}

.carousel button.prev {
  left: 10px;
}

.carousel button.next {
  right: 10px;
}

/* 鼠标悬停轮播图显示按钮 */
.carousel:hover button {
  opacity: 1;
}
  </style>
</head>

<body>

<header>
  <h1>Jia LIU</h1>
  <p>Illustration · Animation · Graphic Design · Translation</p>
</header>

<nav>
  <a href="#">About</a>
  <a href="#">Work</a>
  <a href="#">Links</a>
</nav>

<div class="carousel">
  <img src="nikkas-tiny-wonders01.jpg" class="active">
  <img src="nikkas-tiny-wonders02.jpg">
  <img src="image3.jpg">
  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>
</div>

<script>
  // Carousel script
  const images = document.querySelectorAll('.carousel img');
  const prevBtn = document.querySelector('.carousel .prev');
  const nextBtn = document.querySelector('.carousel .next');
  let current = 0;

  function showImage(index) {
    images.forEach((img, i) => img.classList.toggle('active', i === index));
  }

  prevBtn.addEventListener('click', () => {
    current = (current - 1 + images.length) % images.length;
    showImage(current);
  });

  nextBtn.addEventListener('click', () => {
    current = (current + 1) % images.length;
    showImage(current);
  });

  // Automatic slideshow every 5 seconds
  setInterval(() => {
    current = (current + 1) % images.length;
    showImage(current);
  }, 5000);
</script>

</body>
</html>
