<!DOCTYPE html>

<head>

  <style>
    body {
      font-family: 'Helvetica', sans-serif;
      margin: 0;
      padding: 0;
      background: #fff;
      color: #222;
      font-weight: 300;
    }

    /* Header + nav */
    header {
      text-align: center;
      padding: 2vh 20px;
      background: #fff;
    }

    header h1 {
      font-size: 2em;       /* 小于主页标题 */
      margin: 0;
      font-weight: 500;
    }

    nav {
      text-align: center;
      margin: 1vh 0;
    }

    nav a {
      display: inline-block;
      margin: 0 15px;
      text-decoration: none;
      color: #222;
      font-weight: 300;
      font-size: 1em;
      transition: color 0.3s, font-weight 0.3s;
    }

    nav a:hover {
      color: #555;
      font-weight: 500;
    }

   /* 父容器 */
.grid-container {
  column-count: 3;           /* 列数，可根据屏幕调整 */
  column-gap: 16px;          /* 列间距 */
  width: 90%;
  margin: 0 auto;
}

/* 每个网格项目 */
.grid-item {
  display: inline-block;     /* 让每个块在列中显示 */
  width: 100%;               /* 占满所在列宽度 */
  margin-bottom: 16px;       /* 每个网格间距 */
  position: relative;   /* ⭐关键：让caption定位到图片上 */
  overflow: hidden;     /* ⭐防止放大溢出 */
}

.grid-item img {
  width: 100%;               /* 图片宽度填充父容器 */
  height: auto;              /* 高度自适应，保持比例 */
  display: block;
  border-radius: 10px;
}

    .grid-item:hover img {
      transform: scale(1.05);  /* 悬停放大效果 */
      filter: brightness(70%);  /* ⭐变暗 */
    }

    /* 文字注释悬浮显示 */
.caption {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  padding: 10px;
  color: #fff;
  text-align: center;
  opacity: 0;                 /* 默认隐藏 */
  transition: opacity 0.3s;
  font-weight: 500;
  font-size: 1em;
}

/* 悬停显示文字 */
.grid-item:hover .caption {
  opacity: 1;
}

/* 链接覆盖整个 grid-item */
.grid-item a {
  display: block;
  text-decoration: none;
  color: inherit;
}
  </style>
</head>
